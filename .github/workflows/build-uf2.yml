name: Build UF2

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "README.md"
      - "**/*.md"
      - "python/**"
  pull_request:
    paths-ignore:
      - "README.md"
      - "**/*.md"
      - "python/**"
  schedule:
    - cron: "25 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: ecm-rndis
            use_ecm: "1"
            suffix: ecm-rndis
          - name: ncm
            use_ecm: ""
            suffix: ncm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            build-essential

      - name: Fetch pico-sdk
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git "$HOME/pico-sdk"
          git -C "$HOME/pico-sdk" submodule update --init

      - name: Compute build metadata
        id: meta
        run: |
          echo "commit_id=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: |
          if [ -n "${{ matrix.variant.use_ecm }}" ]; then
            cmake -S . -B "build-${{ matrix.variant.suffix }}" -G Ninja \
              -DPICO_SDK_PATH="$HOME/pico-sdk" \
              -DBROWSERIO_USE_ECM="${{ matrix.variant.use_ecm }}"
          else
            cmake -S . -B "build-${{ matrix.variant.suffix }}" -G Ninja \
              -DPICO_SDK_PATH="$HOME/pico-sdk"
          fi

      - name: Build firmware
        run: cmake --build "build-${{ matrix.variant.suffix }}" --parallel

      - name: Rename UF2 artifact
        run: |
          mkdir -p dist
          cp "build-${{ matrix.variant.suffix }}/picowebserverspi.uf2" \
            "dist/maplelink-${{ steps.meta.outputs.commit_id }}-${{ matrix.variant.suffix }}.uf2"
          cp "build-${{ matrix.variant.suffix }}/picowebserverspi.uf2" \
            "dist/maplelink-${{ matrix.variant.suffix }}.uf2"

      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: maplelink-${{ matrix.variant.suffix }}-uf2
          path: |
            dist/maplelink-${{ steps.meta.outputs.commit_id }}-${{ matrix.variant.suffix }}.uf2
            dist/maplelink-${{ matrix.variant.suffix }}.uf2
          if-no-files-found: error

  publish-nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download UF2 artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build nightly release notes
        id: notes
        run: |
          {
            echo "body<<EOF"
            echo "Automated nightly build."
            echo ""
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo ""
            echo "Direct download links:"
            echo "- https://github.com/${GITHUB_REPOSITORY}/releases/download/nightly/maplelink-ncm.uf2"
            echo "- https://github.com/${GITHUB_REPOSITORY}/releases/download/nightly/maplelink-ecm-rndis.uf2"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          body: ${{ steps.notes.outputs.body }}
          files: |
            dist/maplelink-ncm.uf2
            dist/maplelink-ecm-rndis.uf2
            dist/maplelink-*-ncm.uf2
            dist/maplelink-*-ecm-rndis.uf2
          overwrite_files: true
