name: Build UF2

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - name: ecm-rndis
            use_ecm: "1"
            suffix: ecm-rndis
          - name: ncm
            use_ecm: ""
            suffix: ncm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            build-essential

      - name: Fetch pico-sdk
        run: |
          git clone --depth 1 https://github.com/raspberrypi/pico-sdk.git "$HOME/pico-sdk"
          git -C "$HOME/pico-sdk" submodule update --init

      - name: Compute build metadata
        id: meta
        run: |
          echo "commit_id=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: |
          if [ -n "${{ matrix.variant.use_ecm }}" ]; then
            cmake -S . -B "build-${{ matrix.variant.suffix }}" -G Ninja \
              -DPICO_SDK_PATH="$HOME/pico-sdk" \
              -DCMAKE_C_FLAGS="-DUSE_ECM=${{ matrix.variant.use_ecm }}"
          else
            cmake -S . -B "build-${{ matrix.variant.suffix }}" -G Ninja \
              -DPICO_SDK_PATH="$HOME/pico-sdk"
          fi

      - name: Build firmware
        run: cmake --build "build-${{ matrix.variant.suffix }}" --parallel

      - name: Rename UF2 artifact
        run: |
          mkdir -p dist
          cp "build-${{ matrix.variant.suffix }}/picowebserverspi.uf2" \
            "dist/maplelink-${{ steps.meta.outputs.commit_id }}-${{ matrix.variant.suffix }}.uf2"

      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: maplelink-${{ matrix.variant.suffix }}-uf2
          path: dist/maplelink-${{ steps.meta.outputs.commit_id }}-${{ matrix.variant.suffix }}.uf2
          if-no-files-found: error
