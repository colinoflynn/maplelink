<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Pico BrowserIO</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root { --bg:#0b0f14; --bg2:#111827; --fg:#e6edf3; --dim:#9ca3af; --line:#334155; --ok:#22c55e; --err:#ef4444; }
    body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.4 monospace; }
    .bar { padding:8px; border-bottom:1px solid #1f2937; background:var(--bg2); display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .tabs { position:sticky; top:0; z-index:5; }
    .tabbtn.active { border-color:#22c55e; box-shadow:0 0 0 1px #22c55e inset; }
    .hidden { display:none !important; }
    .group { border-bottom:1px solid #1f2937; padding:8px; background:#0f172a; }
    .gtitle { font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:#93c5fd; margin:0 0 6px 0; }
    .grow { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    label { display:flex; gap:6px; align-items:center; }
    input, select, button { background:#0f172a; color:var(--fg); border:1px solid var(--line); padding:4px 8px; }
    #shell { display:grid; grid-template-columns:1fr; gap:0; height:calc(100vh - 102px); }
    #shell.hex { grid-template-columns:2fr 1fr; }
    #shell.vt #term { display:none; }
    #shell.vt #termvt { display:block; }
    .pane { min-height:0; overflow:auto; padding:10px; white-space:pre-wrap; word-break:break-word; border-right:1px solid #1f2937; outline:none; }
    #term { color:var(--fg); }
    #termvt { display:none; padding:0; white-space:normal; word-break:normal; }
    #hex { color:#93c5fd; background:#0a1222; display:none; }
    #shell.hex #hex { display:block; }
    .ok{color:var(--ok)} .err{color:var(--err)} .dim{color:var(--dim)}
    .ansi-bold{font-weight:bold}
    .fg30{color:#111}.fg31{color:#ef4444}.fg32{color:#22c55e}.fg33{color:#eab308}.fg34{color:#3b82f6}.fg35{color:#a855f7}.fg36{color:#06b6d4}.fg37{color:#e5e7eb}
    .fg90{color:#6b7280}.fg91{color:#f87171}.fg92{color:#4ade80}.fg93{color:#facc15}.fg94{color:#60a5fa}.fg95{color:#c084fc}.fg96{color:#22d3ee}.fg97{color:#f9fafb}
    .bg40{background:#111}.bg41{background:#7f1d1d}.bg42{background:#14532d}.bg43{background:#713f12}.bg44{background:#1e3a8a}.bg45{background:#581c87}.bg46{background:#164e63}.bg47{background:#d1d5db}
    .bg100{background:#374151}.bg101{background:#991b1b}.bg102{background:#166534}.bg103{background:#854d0e}.bg104{background:#1d4ed8}.bg105{background:#7e22ce}.bg106{background:#0e7490}.bg107{background:#f3f4f6}
    #tx { width:min(460px,95vw); }
    .pending { outline:2px solid #f59e0b; background:#3b2a0a; }
    #dirty { display:none; color:#f59e0b; font-weight:bold; }
    #dirty.show { display:inline; }
    .cursor { display:inline-block; width:8px; height:1em; background:#e6edf3; vertical-align:bottom; animation:blink 1s steps(1,end) infinite; }
    @keyframes blink { 50%{opacity:0} }
    #spiout { height:calc(100vh - 220px); overflow:auto; padding:10px; white-space:pre-wrap; border-top:1px solid #1f2937; color:#cbd5e1; }
    #spipins { font-size:12px; color:#c4d7f2; display:block; }
    .pinrow { display:grid; grid-template-columns:64px 92px 84px 1fr; gap:8px; align-items:center; padding:3px 0; }
    .pstate { padding:1px 6px; border-radius:10px; border:1px solid #334155; text-align:center; font-weight:bold; font-size:11px; }
    .p-high { background:#14532d; color:#bbf7d0; border-color:#166534; }
    .p-low { background:#3f1d1d; color:#fecaca; border-color:#7f1d1d; }
    .p-toggle { background:#1e3a8a; color:#bfdbfe; border-color:#1d4ed8; }
    .p-na { background:#1f2937; color:#9ca3af; border-color:#374151; }
    .prate { color:#93c5fd; font-size:11px; }
    .pbar { height:8px; border:1px solid #334155; background:#0a1222; border-radius:6px; overflow:hidden; }
    .pbarfill { height:100%; width:0%; background:linear-gradient(90deg,#0ea5e9,#22c55e); }
    #spidump { color:#93c5fd; font-size:12px; }
  </style>
</head>
<body>
  <div class="bar tabs">
    <button id="tabTerm" class="tabbtn active">Terminal</button>
    <button id="tabSpi" class="tabbtn">SPI</button>
  </div>

  <div id="terminalPanel">
  <div class="bar">
    <label>Baud <input id="baud" type="number" value="115200" min="300" step="100"></label>
    <label>Data <select id="data"><option>8</option><option>7</option></select></label>
    <label>Parity <select id="parity"><option value="none">none</option><option value="even">even</option><option value="odd">odd</option></select></label>
    <label>Stop <select id="stop"><option value="1">1</option><option value="2">2</option></select></label>
    <label>Enter <select id="enter"><option value="none">none</option><option value="cr">\r</option><option value="lf">\n</option><option value="crlf" selected>\r\n</option></select></label>
    <label>Send <select id="sendmode"><option value="type">as you type</option><option value="line">on Enter only</option></select></label>
    <label>Decode <select id="decode"><option value="plain">plain</option><option value="ansi">ansi colors</option><option value="vt100">vt100 (xterm.js)</option></select></label>
    <label><input id="hexview" type="checkbox">hex view</label>
    <label>Hex cols <input id="hexcols" type="number" value="16" min="4" max="64" step="1"></label>
    <label>Hex gap ms <input id="hexgap" type="number" value="100" min="10" max="2000" step="10"></label>
    <label>Backlog KB <input id="retainkb" type="number" value="256" min="32" max="2048" step="32"></label>
    <label><input id="localecho" type="checkbox">local echo</label>
    <button id="apply">Apply</button>
    <span id="dirty">settings changed - press Apply</span>
    <span id="st">connecting...</span>
  </div>

  <div class="bar">
    <input id="txstr" type="text" placeholder="Paste plain text here, then Send Text" style="width:min(520px,95vw)">
    <select id="histtext"><option value="">recent text...</option></select>
    <button id="sendtext">Send Text</button>
    <input id="tx" type="text" placeholder="Send byte sequence (e.g. 01 02 ff or 0x41,0x42)">
    <select id="histhex"><option value="">recent hex...</option></select>
    <button id="sendbytes">Send Bytes</button>
    <button id="dltext">Download Text Log</button>
    <button id="dlraw">Download Raw Binary</button>
    <button id="clear">Clear Terminal Output</button>
    <span class="dim">Tip: click terminal pane to type</span>
  </div>

  <div id="shell">
    <div id="term" class="pane" tabindex="0"></div>
    <div id="termvt" class="pane"></div>
    <div id="hex" class="pane"></div>
  </div>
  </div>

  <div id="spiPanel" class="hidden">
    <div class="group">
      <div class="gtitle">Safety and Link</div>
      <div class="grow">
        <label><input id="spitristate" type="checkbox" checked>Tri-state by default</label>
        <label><input id="spipullups" type="checkbox" checked>Pull-ups enabled</label>
        <label><input id="spirst" type="checkbox">RST pin present</label>
        <label><input id="spihold" type="checkbox">HOLD pin present</label>
        <button id="spiapplyio">Apply I/O Safety</button>
        <button id="spicfg">Get SPI Config</button>
        <label>Speed <select id="spispeed">
          <option value="10000">10 kHz</option><option value="200000">200 kHz</option>
          <option value="500000">500 kHz</option><option value="1000000" selected>1 MHz</option>
          <option value="2000000">2 MHz</option><option value="5000000">5 MHz</option>
          <option value="10000000">10 MHz</option>
        </select></label>
        <button id="spisetspeed">Apply Speed</button>
        <span id="spist" class="dim">idle</span>
      </div>
    </div>
    <div class="group">
      <div class="gtitle">Pin Monitor and Sniffer</div>
      <div class="grow">
        <button id="spidetectstart">Start Pin Detect</button>
        <button id="spidetectstop">Stop Pin Detect</button>
        <button id="spisniffstart">Start Sniffer</button>
        <button id="spisniffstop">Stop Sniffer</button>
      </div>
      <div class="bar" id="spipins">
        <div class="pinrow"><div>MOSI</div><div id="pin-mosi-state" class="pstate p-na">N/A</div><div id="pin-mosi-rate" class="prate">--</div><div class="pbar"><div id="pin-mosi-bar" class="pbarfill"></div></div></div>
        <div class="pinrow"><div>MISO</div><div id="pin-miso-state" class="pstate p-na">N/A</div><div id="pin-miso-rate" class="prate">--</div><div class="pbar"><div id="pin-miso-bar" class="pbarfill"></div></div></div>
        <div class="pinrow"><div>CS</div><div id="pin-cs-state" class="pstate p-na">N/A</div><div id="pin-cs-rate" class="prate">--</div><div class="pbar"><div id="pin-cs-bar" class="pbarfill"></div></div></div>
        <div class="pinrow"><div>CLK</div><div id="pin-clk-state" class="pstate p-na">N/A</div><div id="pin-clk-rate" class="prate">--</div><div class="pbar"><div id="pin-clk-bar" class="pbarfill"></div></div></div>
        <div class="pinrow"><div>RST</div><div id="pin-rst-state" class="pstate p-na">N/A</div><div id="pin-rst-rate" class="prate">--</div><div class="pbar"><div id="pin-rst-bar" class="pbarfill"></div></div></div>
        <div class="pinrow"><div>HOLD</div><div id="pin-hold-state" class="pstate p-na">N/A</div><div id="pin-hold-rate" class="prate">--</div><div class="pbar"><div id="pin-hold-bar" class="pbarfill"></div></div></div>
      </div>
    </div>
    <div class="group">
      <div class="gtitle">ID Poll</div>
      <div class="grow">
        <label>ID Interval ms <input id="spiidint" type="number" min="50" max="5000" step="50" value="250"></label>
        <button id="spiidstart">Start ID Poll</button>
        <button id="spiidstop">Stop ID Poll</button>
      </div>
    </div>
    <div class="group">
      <div class="gtitle">Dump</div>
      <div class="grow">
        <label>Read Cmd <input id="spidumpcmd" type="text" value="0x03" style="width:68px"></label>
        <label>Addr Bytes <select id="spidumpaddr"><option>2</option><option selected>3</option><option>4</option></select></label>
        <label>Length <input id="spidumplen" type="number" min="1" step="256" value="4096"></label>
        <label>Chunk <input id="spidumpchunk" type="number" min="16" step="16" value="256"></label>
        <label><input id="spidumpdbl" type="checkbox">Double-read verify</label>
        <label><input id="spidumpff" type="checkbox" checked>FF run optimize</label>
        <button id="spidumpstart">Start Dump</button>
        <button id="spidumpstop">Stop Dump</button>
      </div>
    </div>
    <div class="bar" id="spidump">dump: idle</div>
    <div id="spiout"></div>
  </div>

  <script>
    const term=document.getElementById('term');
    const termVt=document.getElementById('termvt');
    const hex=document.getElementById('hex');
    const shell=document.getElementById('shell');
    const terminalPanel=document.getElementById('terminalPanel');
    const spiPanel=document.getElementById('spiPanel');
    const tabTerm=document.getElementById('tabTerm');
    const tabSpi=document.getElementById('tabSpi');
    const spiCfgBtn=document.getElementById('spicfg');
    const spiApplyIoBtn=document.getElementById('spiapplyio');
    const spiSetSpeedBtn=document.getElementById('spisetspeed');
    const spiDetectStartBtn=document.getElementById('spidetectstart');
    const spiDetectStopBtn=document.getElementById('spidetectstop');
    const spiSniffStartBtn=document.getElementById('spisniffstart');
    const spiSniffStopBtn=document.getElementById('spisniffstop');
    const spiIdStartBtn=document.getElementById('spiidstart');
    const spiIdStopBtn=document.getElementById('spiidstop');
    const spiDumpStartBtn=document.getElementById('spidumpstart');
    const spiDumpStopBtn=document.getElementById('spidumpstop');
    const spiTriState=document.getElementById('spitristate');
    const spiPullups=document.getElementById('spipullups');
    const spiRst=document.getElementById('spirst');
    const spiHold=document.getElementById('spihold');
    const spiSpeed=document.getElementById('spispeed');
    const spiIdInt=document.getElementById('spiidint');
    const spiDumpCmd=document.getElementById('spidumpcmd');
    const spiDumpAddr=document.getElementById('spidumpaddr');
    const spiDumpLen=document.getElementById('spidumplen');
    const spiDumpChunk=document.getElementById('spidumpchunk');
    const spiDumpDbl=document.getElementById('spidumpdbl');
    const spiDumpFf=document.getElementById('spidumpff');
    const spiPins=document.getElementById('spipins');
    const spiDump=document.getElementById('spidump');
    const spiSt=document.getElementById('spist');
    const spiOut=document.getElementById('spiout');
    const pinUi={
      mosi:{state:document.getElementById('pin-mosi-state'),rate:document.getElementById('pin-mosi-rate'),bar:document.getElementById('pin-mosi-bar')},
      miso:{state:document.getElementById('pin-miso-state'),rate:document.getElementById('pin-miso-rate'),bar:document.getElementById('pin-miso-bar')},
      cs:{state:document.getElementById('pin-cs-state'),rate:document.getElementById('pin-cs-rate'),bar:document.getElementById('pin-cs-bar')},
      clk:{state:document.getElementById('pin-clk-state'),rate:document.getElementById('pin-clk-rate'),bar:document.getElementById('pin-clk-bar')},
      rst:{state:document.getElementById('pin-rst-state'),rate:document.getElementById('pin-rst-rate'),bar:document.getElementById('pin-rst-bar')},
      hold:{state:document.getElementById('pin-hold-state'),rate:document.getElementById('pin-hold-rate'),bar:document.getElementById('pin-hold-bar')}
    };
    const st=document.getElementById('st');
    const applyBtn=document.getElementById('apply');
    const dirty=document.getElementById('dirty');
    const sendMode=document.getElementById('sendmode');
    const enterMode=document.getElementById('enter');
    const decodeMode=document.getElementById('decode');
    const hexView=document.getElementById('hexview');
    const hexCols=document.getElementById('hexcols');
    const hexGap=document.getElementById('hexgap');
    const retainKb=document.getElementById('retainkb');
    const localEcho=document.getElementById('localecho');
    const txStr=document.getElementById('txstr');
    const histText=document.getElementById('histtext');
    const tx=document.getElementById('tx');
    const histHex=document.getElementById('histhex');
    const dlText=document.getElementById('dltext');
    const dlRaw=document.getElementById('dlraw');
    const cursor=document.createElement('span');cursor.className='cursor';
    const ws=new WebSocket('ws://'+location.hostname+':81/ws');
    ws.binaryType='arraybuffer';
    const enc=new TextEncoder();
    const dec=new TextDecoder('utf-8',{fatal:false});
    let lineBuf='';
    let hexOffset=0;
    let pendingHexChunks=[];
    let pendingHexBytes=0;
    let hexTimer=null;
    let rxChunks=[];
    let rxFlushTimer=null;
    let termCharCount=0;
    let textLog='';
    let rawLogChunks=[];
    let rawLogBytes=0;
    let xterm=null;
    let xtermLoading=false;
    let xtermFailed=false;
    const MAX_HISTORY=12;
    const textHistory=[];
    const hexHistory=[];
    const sgr={bold:false,fg:'',bg:''};
    let activeTab='terminal';
    let pinPrevTs=0;
    let pinPrevTr={mosi:0,miso:0,cs:0,clk:0,rst:0,hold:0};

    function markDirty(v){if(v){applyBtn.classList.add('pending');dirty.classList.add('show');}else{applyBtn.classList.remove('pending');dirty.classList.remove('show');}}
    function setTab(tab){activeTab=tab;const t=tab==='terminal';terminalPanel.classList.toggle('hidden',!t);spiPanel.classList.toggle('hidden',t);tabTerm.classList.toggle('active',t);tabSpi.classList.toggle('active',!t);if(t)term.focus();}
    function spiLog(s,cls){const line=document.createElement('div');if(cls)line.className=cls;line.textContent=s;spiOut.appendChild(line);spiOut.scrollTop=spiOut.scrollHeight;}
    function spiSend(type,obj){const m=Object.assign({type:type,port:'spi0'},obj||{});send(m);}
    function parseNum(s,def){const n=parseInt(String(s||''),10);return Number.isFinite(n)?n:def;}
    function parseHexByte(s,def){let t=String(s||'').trim().toLowerCase();if(t.startsWith('0x'))t=t.slice(2);if(!/^[0-9a-f]{1,2}$/.test(t))return def;return parseInt(t,16);}
    function setPinUi(pin,level,available,delta,dtMs){
      const u=pinUi[pin];if(!u)return;
      const base='pstate ';
      if(!available){u.state.textContent='N/A';u.state.className=base+'p-na';u.rate.textContent='--';u.bar.style.width='0%';return;}
      const hz=(dtMs>0&&delta>0)?(delta*1000/dtMs):0;
      if(delta>0){u.state.textContent='TOGGLING';u.state.className=base+'p-toggle';}
      else if(level){u.state.textContent='HIGH';u.state.className=base+'p-high';}
      else{u.state.textContent='LOW';u.state.className=base+'p-low';}
      if(hz>=1000)u.rate.textContent=(hz/1000).toFixed(hz>=10000?0:1)+' kHz';
      else u.rate.textContent=hz.toFixed(hz>=100?0:1)+' Hz';
      const norm=Math.min(1,Math.log10(hz+1)/5); // 100 kHz ~= full scale
      u.bar.style.width=Math.round(norm*100)+'%';
    }
    function handleSpiMessage(m){
      if(m.type==='spi.config'){
        if(typeof m.tristate_default==='boolean')spiTriState.checked=m.tristate_default;
        if(typeof m.pullups_enabled==='boolean')spiPullups.checked=m.pullups_enabled;
        if(typeof m.hold_present==='boolean')spiHold.checked=m.hold_present;
        if(typeof m.rst_present==='boolean')spiRst.checked=m.rst_present;
        if(m.speed_hz)spiSpeed.value=String(m.speed_hz);
        if(m.idpoll_interval_ms)spiIdInt.value=String(m.idpoll_interval_ms);
        if(m.dump&&m.dump.addr_bytes)spiDumpAddr.value=String(m.dump.addr_bytes);
        if(m.dump&&typeof m.dump.read_cmd==='number')spiDumpCmd.value='0x'+m.dump.read_cmd.toString(16);
        if(m.dump&&typeof m.dump.double_read==='boolean')spiDumpDbl.checked=m.dump.double_read;
        if(m.dump&&typeof m.dump.ff_opt==='boolean')spiDumpFf.checked=m.dump.ff_opt;
        spiSt.textContent='config loaded';spiSt.className='ok';spiLog('[spi.config] '+JSON.stringify(m));return true;
      }
      if(m.type==='spi.pins'){
        const tr=m.transitions||{};
        const now=performance.now();
        const dt=Math.max(1,pinPrevTs?now-pinPrevTs:0);
        const d={mosi:(tr.mosi||0)-pinPrevTr.mosi,miso:(tr.miso||0)-pinPrevTr.miso,cs:(tr.cs||0)-pinPrevTr.cs,clk:(tr.clk||0)-pinPrevTr.clk,rst:(tr.rst||0)-pinPrevTr.rst,hold:(tr.hold||0)-pinPrevTr.hold};
        setPinUi('mosi',!!m.mosi,true,Math.max(0,d.mosi),dt);
        setPinUi('miso',!!m.miso,true,Math.max(0,d.miso),dt);
        setPinUi('cs',!!m.cs,true,Math.max(0,d.cs),dt);
        setPinUi('clk',!!m.clk,true,Math.max(0,d.clk),dt);
        setPinUi('rst',!!m.rst,m.rst!=null,Math.max(0,d.rst),dt);
        setPinUi('hold',!!m.hold,m.hold!=null,Math.max(0,d.hold),dt);
        pinPrevTr={mosi:tr.mosi||0,miso:tr.miso||0,cs:tr.cs||0,clk:tr.clk||0,rst:tr.rst||0,hold:tr.hold||0};
        pinPrevTs=now;
        return true;
      }
      if(m.type==='spi.id.result'){spiSt.textContent='id '+(m.id_hex||'');spiSt.className='ok';spiLog('[spi.id] '+JSON.stringify(m));return true;}
      if(m.type==='spi.sniffer.frame'){spiLog('[sniffer] '+(m.hex||JSON.stringify(m)));return true;}
      if(m.type==='spi.dump.chunk'){
        if(m.mode==='ff_run')spiDump.textContent='dump offset '+(m.offset||0)+' ff-run '+(m.count||0)+' bytes';
        else spiDump.textContent='dump offset '+(m.offset||0)+' data '+(m.hex_preview||'');
        spiLog('[dump.chunk] '+JSON.stringify(m));return true;
      }
      if(m.type==='spi.dump.verify'){spiLog('[dump.verify] '+JSON.stringify(m),m.ok?'ok':'err');return true;}
      if(m.type==='spi.dump.status'){spiSt.textContent=m.state||'status';spiSt.className='ok';spiLog('[spi.dump.status] '+JSON.stringify(m));return true;}
      return false;
    }
    function keepCursor(){if(cursor.parentNode)cursor.parentNode.removeChild(cursor);term.appendChild(cursor);}
    function termLimit(){const kb=Math.max(32,Math.min(2048,parseInt(retainKb.value,10)||256));return kb*1024;}
    function hexLimit(){return Math.floor(termLimit()*1.5);}
    function rawLimit(){return Math.max(256*1024,termLimit()*4);}
    function appendTextLog(s){if(!s)return;textLog+=s;const lim=termLimit();if(textLog.length>lim)textLog=textLog.slice(-lim);}
    function pushRawLog(bytes){if(!bytes||!bytes.length)return;const c=new Uint8Array(bytes.length);c.set(bytes);rawLogChunks.push(c);rawLogBytes+=c.length;const lim=rawLimit();while(rawLogBytes>lim&&rawLogChunks.length){rawLogBytes-=rawLogChunks[0].length;rawLogChunks.shift();}}
    function saveBlob(name,type,parts){const b=new Blob(parts,{type:type});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},0);}
    function stamp(){const d=new Date();const p=n=>String(n).padStart(2,'0');return d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'_'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds());}
    function xtermScrollback(){return Math.max(256,Math.min(50000,Math.floor(termLimit()/120)));}
    function trimTerm(){const lim=termLimit();while(termCharCount>lim){const n=term.firstChild;if(!n||n===cursor)break;const l=(n.textContent||'').length;termCharCount-=l;term.removeChild(n);}if(termCharCount<0)termCharCount=0;}
    function atBottom(el){return el.scrollHeight-el.scrollTop-el.clientHeight<8;}
    function appendTerm(text,cls){const stick=atBottom(term);const span=document.createElement('span');if(cls)span.className=cls;span.textContent=text;term.appendChild(span);appendTextLog(text);termCharCount+=text.length;trimTerm();keepCursor();if(stick)term.scrollTop=term.scrollHeight;}
    function appendTermStyled(text){const cls=[sgr.bold?'ansi-bold':'',sgr.fg,sgr.bg].filter(Boolean).join(' ');appendTerm(text,cls);}
    function parseSgr(code){if(!code||code==='0'){sgr.bold=false;sgr.fg='';sgr.bg='';return;}code.split(';').forEach(c=>{const n=parseInt(c||'0',10);if(n===0){sgr.bold=false;sgr.fg='';sgr.bg='';}else if(n===1)sgr.bold=true;else if(n===22)sgr.bold=false;else if(n===39)sgr.fg='';else if(n===49)sgr.bg='';else if((n>=30&&n<=37)||(n>=90&&n<=97))sgr.fg='fg'+n;else if((n>=40&&n<=47)||(n>=100&&n<=107))sgr.bg='bg'+n;});}
    function appendAnsi(text){let i=0;while(i<text.length){const esc=text.indexOf('\u001b[',i);if(esc<0){appendTermStyled(text.slice(i));break;}if(esc>i)appendTermStyled(text.slice(i,esc));const m=/^\u001b\[([0-9;]*)m/.exec(text.slice(esc));if(!m){appendTermStyled(text.slice(esc,esc+1));i=esc+1;continue;}parseSgr(m[1]);i=esc+m[0].length;}}
    function appendHexNow(bytes){if(!hexView.checked)return;const stick=atBottom(hex);let out='';const cols=Math.max(4,Math.min(64,parseInt(hexCols.value,10)||16));for(let i=0;i<bytes.length;i+=cols){const chunk=bytes.slice(i,i+cols);const off=(hexOffset+i).toString(16).padStart(8,'0');const hx=Array.from(chunk,b=>b.toString(16).padStart(2,'0')).join(' ');const asc=Array.from(chunk,b=>(b>=32&&b<=126)?String.fromCharCode(b):'.').join('');out+=off+'  '+hx.padEnd(cols*3-1,' ')+'  '+asc+'\n';}hexOffset+=bytes.length;hex.textContent+=out;if(hex.textContent.length>hexLimit())hex.textContent=hex.textContent.slice(-hexLimit());if(stick)hex.scrollTop=hex.scrollHeight;}
    function flushHex(){if(!pendingHexBytes)return;const b=new Uint8Array(pendingHexBytes);let o=0;for(const ch of pendingHexChunks){b.set(ch,o);o+=ch.length;}pendingHexChunks=[];pendingHexBytes=0;appendHexNow(b);}
    function queueHex(bytes){if(!hexView.checked)return;pendingHexChunks.push(bytes);pendingHexBytes+=bytes.length;if(hexTimer)clearTimeout(hexTimer);const gap=Math.max(10,Math.min(2000,parseInt(hexGap.value,10)||100));hexTimer=setTimeout(()=>{hexTimer=null;flushHex();},gap);}
    function processRxChunks(){if(!rxChunks.length){rxFlushTimer=null;return;}const parts=rxChunks;rxChunks=[];rxFlushTimer=null;let total=0;for(const p of parts)total+=p.length;const b=new Uint8Array(total);let o=0;for(const p of parts){b.set(p,o);o+=p.length;}pushRawLog(b);queueHex(b);const txt=dec.decode(b);if(decodeMode.value==='vt100'&&xterm){xterm.write(txt);appendTextLog(txt);}else if(decodeMode.value==='ansi')appendAnsi(txt);else appendTerm(txt);}
    function queueRx(bytes){rxChunks.push(bytes);if(rxFlushTimer===null)rxFlushTimer=setTimeout(processRxChunks,16);}
    function enterBytes(){if(enterMode.value==='none')return new Uint8Array([]);if(enterMode.value==='lf')return new Uint8Array([10]);if(enterMode.value==='crlf')return new Uint8Array([13,10]);return new Uint8Array([13]);}
    function sendBinary(arr){if(ws.readyState===1&&arr&&arr.length>0)ws.send(arr);}
    function sendTextLine(str){if(!str)return;sendBinary(enc.encode(str));}
    function parseByteInput(s){const toks=s.trim().split(/[\s,]+/).filter(Boolean);const out=[];for(const t0 of toks){let t=t0.toLowerCase();if(t.startsWith('0x'))t=t.slice(2);if(!/^[0-9a-f]{1,2}$/.test(t))throw new Error('bad byte: '+t0);out.push(parseInt(t,16));}return new Uint8Array(out);}
    function addHistory(list,val){const v=(val||'').trim();if(!v)return;const i=list.indexOf(v);if(i>=0)list.splice(i,1);list.unshift(v);if(list.length>MAX_HISTORY)list.length=MAX_HISTORY;}
    function syncHistory(sel,list,label){sel.innerHTML='';const first=document.createElement('option');first.value='';first.textContent=label;sel.appendChild(first);for(const v of list){const o=document.createElement('option');o.value=v;o.textContent=v.length>72?v.slice(0,72)+'...':v;sel.appendChild(o);}sel.value='';}
    function send(o){if(ws.readyState===1)ws.send(JSON.stringify(o));}
    function loadScript(src){return new Promise((ok,fail)=>{const s=document.createElement('script');s.src=src;s.onload=ok;s.onerror=fail;document.head.appendChild(s);});}
    function loadCss(href){if(document.querySelector('link[data-xterm]'))return;const l=document.createElement('link');l.rel='stylesheet';l.href=href;l.setAttribute('data-xterm','1');document.head.appendChild(l);}
    async function ensureXterm(){if(xterm||xtermLoading||xtermFailed)return;xtermLoading=true;try{loadCss('__XTERM_CSS_URL__');if(!window.Terminal){try{await loadScript('__XTERM_JS_PRIMARY__');}catch(_){await loadScript('__XTERM_JS_FALLBACK__');}}xterm=new window.Terminal({cursorBlink:true,convertEol:false,scrollback:xtermScrollback(),theme:{background:'#0b0f14',foreground:'#e6edf3'}});xterm.open(termVt);xterm.onData(d=>sendBinary(enc.encode(d)));xterm.write('\r\n[VT100 mode active]\r\n');}catch(_){xtermFailed=true;appendTerm('\n[error failed to load xterm.js, check internet access]\n','err');decodeMode.value='ansi';shell.classList.remove('vt');}finally{xtermLoading=false;}}
    function syncDecodeMode(){if(decodeMode.value==='vt100'){shell.classList.add('vt');ensureXterm();}else{shell.classList.remove('vt');}}

    ws.onopen=()=>{st.textContent='connected';st.className='ok';send({type:'hello'});send({type:'uart.get_config',port:'uart0'});spiSend('spi.get_config');term.focus();};
    ws.onclose=()=>{st.textContent='disconnected';st.className='err';};
    ws.onmessage=(e)=>{if(typeof e.data==='string'){try{const m=JSON.parse(e.data);if(m.type==='uart.config'){appendTerm('\n[config '+JSON.stringify(m)+']\n','ok');}else if(m.type==='error'){appendTerm('\n[error '+(m.msg||'unknown')+']\n','err');if((m.code||'').startsWith('SPI_'))spiLog('[spi.error] '+(m.msg||m.code),'err');}else if(m.type&&m.type.startsWith('spi.')){if(!handleSpiMessage(m))spiLog('[spi] '+JSON.stringify(m));}else{appendTerm('\n['+e.data+']\n');}}catch(_){appendTerm(e.data);}}else{queueRx(new Uint8Array(e.data));}};

    applyBtn.onclick=()=>{send({type:'uart.set_config',port:'uart0',baud:parseInt(document.getElementById('baud').value,10)||115200,data_bits:parseInt(document.getElementById('data').value,10)||8,parity:document.getElementById('parity').value,stop_bits:parseInt(document.getElementById('stop').value,10)||1,flow:'none'});markDirty(false);};
    document.getElementById('sendbytes').onclick=()=>{try{const src=tx.value;const b=parseByteInput(src);if(!b.length)return;sendBinary(b);addHistory(hexHistory,src);syncHistory(histHex,hexHistory,'recent hex...');}catch(err){appendTerm('\n[error '+err.message+']\n','err');}};
    document.getElementById('sendtext').onclick=()=>{const src=txStr.value;if(!src)return;sendBinary(enc.encode(src));addHistory(textHistory,src);syncHistory(histText,textHistory,'recent text...');};
    txStr.addEventListener('keydown',(e)=>{if(e.key==='Enter'){e.preventDefault();document.getElementById('sendtext').click();}});
    histText.addEventListener('change',()=>{if(histText.value)txStr.value=histText.value;});
    histHex.addEventListener('change',()=>{if(histHex.value)tx.value=histHex.value;});
    dlText.onclick=()=>{saveBlob('pico_log_'+stamp()+'.txt','text/plain;charset=utf-8',[textLog]);};
    dlRaw.onclick=()=>{if(!rawLogChunks.length){appendTerm('\n[info raw log is empty]\n','dim');return;}saveBlob('pico_raw_'+stamp()+'.bin','application/octet-stream',rawLogChunks);};
    document.getElementById('clear').onclick=()=>{term.textContent='';hex.textContent='';hexOffset=0;lineBuf='';termCharCount=0;textLog='';rawLogChunks=[];rawLogBytes=0;pendingHexChunks=[];pendingHexBytes=0;rxChunks=[];if(hexTimer){clearTimeout(hexTimer);hexTimer=null;}if(rxFlushTimer){clearTimeout(rxFlushTimer);rxFlushTimer=null;}if(xterm)xterm.clear();sgr.bold=false;sgr.fg='';sgr.bg='';keepCursor();};
    ['baud','data','parity','stop'].forEach(id=>{const el=document.getElementById(id);el.addEventListener('input',()=>markDirty(true));el.addEventListener('change',()=>markDirty(true));});
    hexCols.addEventListener('input',()=>{hexOffset=0;hex.textContent='';});
    retainKb.addEventListener('input',()=>{if(xterm)xterm.options.scrollback=xtermScrollback();});
    decodeMode.addEventListener('change',syncDecodeMode);
    hexView.onchange=()=>{if(hexView.checked){shell.classList.add('hex');}else{shell.classList.remove('hex');pendingHexChunks=[];pendingHexBytes=0;if(hexTimer){clearTimeout(hexTimer);hexTimer=null;}}};
    tabTerm.onclick=()=>setTab('terminal');
    tabSpi.onclick=()=>setTab('spi');
    spiCfgBtn.onclick=()=>spiSend('spi.get_config');
    spiApplyIoBtn.onclick=()=>spiSend('spi.set_io',{tristate_default:spiTriState.checked,pullups_enabled:spiPullups.checked,hold_present:spiHold.checked,rst_present:spiRst.checked});
    spiSetSpeedBtn.onclick=()=>spiSend('spi.set_speed',{speed_hz:parseNum(spiSpeed.value,1000000),idpoll_interval_ms:parseNum(spiIdInt.value,250)});
    spiDetectStartBtn.onclick=()=>spiSend('spi.detect.start');
    spiDetectStopBtn.onclick=()=>spiSend('spi.detect.stop');
    spiSniffStartBtn.onclick=()=>spiSend('spi.sniffer.start');
    spiSniffStopBtn.onclick=()=>spiSend('spi.sniffer.stop');
    spiIdStartBtn.onclick=()=>spiSend('spi.idpoll.start',{interval_ms:parseNum(spiIdInt.value,250),speed_hz:parseNum(spiSpeed.value,1000000)});
    spiIdStopBtn.onclick=()=>spiSend('spi.idpoll.stop');
    spiDumpStartBtn.onclick=()=>{spiSt.textContent='starting dump...';spiSt.className='dim';spiSend('spi.dump.start',{read_cmd:parseHexByte(spiDumpCmd.value,0x03),addr_bytes:parseNum(spiDumpAddr.value,3),length_bytes:parseNum(spiDumpLen.value,4096),chunk_bytes:parseNum(spiDumpChunk.value,256),double_read:spiDumpDbl.checked,ff_opt:spiDumpFf.checked,speed_hz:parseNum(spiSpeed.value,1000000)});};
    spiDumpStopBtn.onclick=()=>{spiSt.textContent='stopping dump...';spiSt.className='dim';spiSend('spi.dump.stop');};
    term.addEventListener('keydown',(e)=>{if(decodeMode.value==='vt100')return;if(ws.readyState!==1)return;if(sendMode.value==='type'){if(e.key==='Enter'){sendBinary(enterBytes());if(localEcho.checked)appendTerm('\n','dim');}else if(e.key==='Backspace'){sendBinary(new Uint8Array([127]));if(localEcho.checked)appendTerm('\b','dim');}else if(e.key.length===1){sendBinary(enc.encode(e.key));if(localEcho.checked)appendTerm(e.key,'dim');}else return;}else{if(e.key==='Enter'){sendTextLine(lineBuf);sendBinary(enterBytes());if(localEcho.checked)appendTerm('\n','dim');lineBuf='';}else if(e.key==='Backspace'){if(lineBuf.length>0)lineBuf=lineBuf.slice(0,-1);}else if(e.key.length===1){lineBuf+=e.key;if(localEcho.checked)appendTerm(e.key,'dim');}else return;}e.preventDefault();});
    setTab('terminal');
    syncDecodeMode();
    keepCursor();
  </script>
</body>
</html>
